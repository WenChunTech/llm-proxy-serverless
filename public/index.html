<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>LLM Proxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/shared-theme.css" />
    <script>
      (() => {
        const themeKey = "llm-proxy-theme";
        const savedTheme = localStorage.getItem(themeKey);
        const isDark = savedTheme ? savedTheme === "dark" : true;
        document.documentElement.classList.toggle("dark", isDark);
      })();
    </script>
    <style>
      .pill {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .accent-pulse {
        position: relative;
        overflow: hidden;
      }

      .accent-pulse::after {
        content: "";
        position: absolute;
        inset: -40%;
        background: radial-gradient(
          circle,
          rgba(245, 158, 11, 0.18),
          transparent 55%
        );
        animation: drift 8s linear infinite;
        pointer-events: none;
      }

      @keyframes drift {
        0% {
          transform: translate(-12%, -8%);
        }
        50% {
          transform: translate(10%, 12%);
        }
        100% {
          transform: translate(-12%, -8%);
        }
      }

      .metric-card,
      .feature-card,
      .ops-card,
      .stack-card,
      .compat-row,
      .workflow-node {
        transition:
          transform 0.25s ease,
          border-color 0.25s ease,
          background 0.25s ease;
      }

      .metric-card:hover,
      .feature-card:hover,
      .ops-card:hover,
      .stack-card:hover,
      .compat-row:hover,
      .workflow-node:hover {
        transform: translateY(-4px);
        border-color: rgba(217, 119, 6, 0.42);
      }

      .hero-title {
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      .marker-line {
        height: 1px;
        background: linear-gradient(
          90deg,
          rgba(217, 119, 6, 0.55),
          rgba(15, 118, 110, 0.18),
          transparent
        );
      }

      .workflow-node-number {
        width: 2rem;
        height: 2rem;
        border-radius: 9999px;
        border: 1px solid var(--border);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--accent);
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
      }

      .example-tab {
        border: 1px solid transparent;
        color: var(--muted);
      }

      .example-tab.active {
        border-color: rgba(217, 119, 6, 0.35);
        background: rgba(217, 119, 6, 0.08);
        color: var(--text);
      }

      .code-shell {
        border: 1px solid var(--border);
        background: #16120f;
        color: #f8f3eb;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      html.dark .code-shell {
        background: #0d1015;
      }

      .code-shell pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .compat-grid {
        display: grid;
        gap: 0.75rem;
      }

      .responsive-actions {
        width: 100%;
      }

      .hero-grid,
      .split-panel-grid,
      .provider-chip-list,
      .example-tab-list,
      .compat-row-grid {
        min-width: 0;
      }

      .compat-endpoint {
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .footer-note {
        color: var(--muted);
      }

      @media (max-width: 767px) {
        .responsive-actions > * {
          flex: 1 1 calc(50% - 0.375rem);
          min-height: 2.75rem;
          justify-content: center;
        }

        .hero-title {
          font-size: clamp(2.5rem, 13vw, 4.5rem);
        }
      }

      @media (max-width: 639px) {
        .responsive-actions > * {
          flex-basis: 100%;
        }

        .example-tab-list > * {
          flex: 1 1 calc(50% - 0.375rem);
          justify-content: center;
        }
      }

      @media (max-width: 420px) {
        .example-tab-list > * {
          flex-basis: 100%;
        }
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
  </head>

      function t(key) {
        return TRANSLATIONS[currentLanguage][key] ??
          TRANSLATIONS.en[key] ?? key;
      }

      function setText(id, value) {
        const el = document.getElementById(id);
        if (el) {
          el.textContent = value;
        }
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function applyTheme(theme) {
        const isDark = theme === "dark";
        document.documentElement.classList.toggle("dark", isDark);
        localStorage.setItem(THEME_KEY, theme);
        setText("themeToggle", isDark ? t("lightMode") : t("darkMode"));
      }

      function toggleTheme() {
        const isDark = document.documentElement.classList.contains(
          "dark",
        );
        applyTheme(isDark ? "light" : "dark");
      }

      function toggleLanguage() {
        currentLanguage = currentLanguage === "en" ? "zh" : "en";
        localStorage.setItem(LANGUAGE_KEY, currentLanguage);
        renderPage();
      }

      function switchExampleTab(tab) {
        currentExampleTab = tab;
        document.querySelectorAll(".example-tab").forEach((button) => {
          button.classList.toggle(
            "active",
            button.id === `tab${tab[0].toUpperCase()}${tab.slice(1)}`,
          );
        });
        const codeKey = {
          openai: "codeOpenai",
          responses: "codeResponses",
          gemini: "codeGemini",
          claude: "codeClaude",
        }[tab];
        setText("exampleCode", t(codeKey));
      }

      function renderList(containerId, items, renderer) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = items.map(renderer).join("");
      }

      function renderProviderChips() {
        renderList(
          "providerChips",
          PROVIDER_CHIPS,
          (item) =>
            `<span class="pill rounded-full px-4 py-2 text-sm">${
              escapeHtml(item)
            }</span>`,
        );
      }

      function renderHeroChecklist() {
        renderList(
          "heroChecklist",
          t("heroChecklistItems"),
          (item) =>
            `<div class="panel-strong rounded-2xl px-4 py-4">

              <span class="mt-1 inline-flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-amber-600 text-xs font-bold text-white">+</span>

        renderStack();
        switchExampleTab(currentExampleTab);
